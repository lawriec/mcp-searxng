services:
  vpn:
    build: ./vpn
    container_name: searxng-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - ${OPENVPN_CONFIG_DIR:?Set OPENVPN_CONFIG_DIR to your .ovpn profiles folder}:/vpn/config:ro
    environment:
      - OVPN_FILE=${OPENVPN_PROFILE:+/vpn/config/${OPENVPN_PROFILE}.ovpn}
      - AUTH_FILE=${OPENVPN_AUTH_FILE:-}
      - ROTATE_INTERVAL_MINS=${ROTATE_INTERVAL_MINS:-30}

  searxng:
    depends_on:
      vpn:
        condition: service_started
    volumes:
      - ./settings-vpn.yml:/etc/searxng/settings.yml:ro
